<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Custom RAG Chat</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8f5;
        --panel: #ffffff;
        --ink: #18201d;
        --muted: #5d6862;
        --line: #d9ded8;
        --accent: #276b5d;
        --accent-2: #a84632;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .app {
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-height: 100vh;
      }

      header {
        border-bottom: 1px solid var(--line);
        padding: 18px clamp(16px, 4vw, 44px);
        background: var(--panel);
      }

      h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
      }

      main {
        width: min(980px, 100%);
        margin: 0 auto;
        padding: 24px clamp(14px, 3vw, 28px);
      }

      #messages {
        display: grid;
        gap: 14px;
      }

      .message {
        max-width: 78ch;
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        line-height: 1.5;
        white-space: pre-wrap;
      }

      .user {
        margin-left: auto;
        border-color: #b7d0c9;
      }

      .assistant {
        margin-right: auto;
      }

      .sources {
        margin-top: 12px;
        color: var(--muted);
        font-size: 13px;
      }

      form {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        width: min(980px, 100%);
        margin: 0 auto;
        padding: 16px clamp(14px, 3vw, 28px) 22px;
        border-top: 1px solid var(--line);
        background: var(--panel);
      }

      input {
        width: 100%;
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 12px;
        color: var(--ink);
        font: inherit;
      }

      button {
        min-height: 44px;
        border: 0;
        border-radius: 8px;
        padding: 0 18px;
        background: var(--accent);
        color: white;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        background: var(--muted);
        cursor: wait;
      }

      .error {
        color: var(--accent-2);
      }

      @media (max-width: 620px) {
        form {
          grid-template-columns: 1fr;
        }

        .message {
          max-width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <h1>Custom RAG Chat</h1>
      </header>

      <main>
        <div id="messages">
          <div class="message assistant">Ask a question about the documents indexed in <code>data/docs</code>.</div>
        </div>
      </main>

      <form id="chat-form">
        <input id="question" name="question" placeholder="Ask your documents..." autocomplete="off" />
        <button id="send" type="submit">Send</button>
      </form>
    </div>

    <script>
      const form = document.querySelector("#chat-form");
      const input = document.querySelector("#question");
      const send = document.querySelector("#send");
      const messages = document.querySelector("#messages");

      function addMessage(text, role, sources = []) {
        const item = document.createElement("div");
        item.className = `message ${role}`;
        item.textContent = text;

        if (sources.length > 0) {
          const sourceList = document.createElement("div");
          sourceList.className = "sources";
          sourceList.textContent = `Sources: ${sources.map((source) => source.source).join(", ")}`;
          item.appendChild(sourceList);
        }

        messages.appendChild(item);
        item.scrollIntoView({ behavior: "smooth", block: "end" });
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const question = input.value.trim();
        if (!question) return;

        addMessage(question, "user");
        input.value = "";
        send.disabled = true;
        send.textContent = "Thinking";

        try {
          const response = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question }),
          });

          if (!response.ok) {
            throw new Error(`Request failed with status ${response.status}`);
          }

          const data = await response.json();
          addMessage(data.answer, "assistant", data.sources || []);
        } catch (error) {
          addMessage(error.message, "assistant error");
        } finally {
          send.disabled = false;
          send.textContent = "Send";
          input.focus();
        }
      });
    </script>
  </body>
</html>
